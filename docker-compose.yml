services:
  relay:
    container_name: rtsp-relay
    pull_policy: build
    build:
      context: .
      dockerfile: deploy/Dockerfile
    env_file: .env
    ports:
      - "${TARGET_PORT:-8554}:${TARGET_PORT:-8554}"
    volumes:
      # Host-editable runtime config (streams.yml + generated output.m3u8).
      # Mounting the directory avoids the "Docker creates an empty dir" footgun
      # of bind-mounting a not-yet-existing file.
      - ./config:/app/config
    restart: unless-stopped
    command: ["run"]
    # One-off single stream instead of the config-driven daemon:
    # command: ["stream", "--channel", "3", "--stream", "main", "--name", "cam3-main"]
